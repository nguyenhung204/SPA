# Tomcat — tăng thread pool để xử lý 1000 CCU
# max-connections: số connection TCP tối đa chấp nhận
# threads.max: số thread worker xử lý request
# accept-count: queue khi tất cả threads bận
# Tomcat — Cấu hình kịch trần
server.tomcat.max-connections=100000
server.tomcat.threads.max=5000
server.tomcat.threads.min-spare=400
server.tomcat.accept-count=30000
server.tomcat.connection-timeout=180000

# Logging — Tắt hết log của Cart/Inventory để giải phóng CPU
logging.level.com.hazelcast=INFO
logging.level.iuh.fit.spa=INFO
logging.level.iuh.fit.spa.order=INFO
logging.level.iuh.fit.spa.inventory=WARN
logging.level.iuh.fit.spa.cart=WARN


# Log format
logging.pattern.console=%d{HH:mm:ss} %-5level [%thread] %logger{1} - %msg%n

# Stock sync
spa.stock-sync.interval-ms=20000


