spring.application.name=SPA
spring.data.mongodb.uri=mongodb+srv://nguyenhung2004200_db_user:W87UoUWquGGfbjXv@cluster1.gypblkl.mongodb.net/?appName=Cluster1

# Tomcat — tăng thread pool để xử lý 1000 CCU
# max-connections: số connection TCP tối đa chấp nhận
# threads.max: số thread worker xử lý request
# accept-count: queue khi tất cả threads bận
# Tomcat — Tăng mạnh thread pool và queue để xử lý 1000 CCU ổn định hơn
# threads.max=2000 giúp xử lý được nhiều request đồng thời hơn khi Hazelcast bị delay
server.tomcat.max-connections=20000
server.tomcat.threads.max=2000
server.tomcat.threads.min-spare=200
server.tomcat.accept-count=5000
server.tomcat.connection-timeout=30000

# Logging — Chuyển hẳn sang ERROR để tránh I/O bottleneck hoàn toàn trong load test
logging.level.root=WARN
logging.level.iuh.fit.spa=ERROR
logging.level.iuh.fit.spa.cart=ERROR
logging.level.iuh.fit.spa.inventory=ERROR
logging.level.iuh.fit.spa.order=ERROR

# Log format tối giản
logging.pattern.console=%d{HH:mm:ss} %-5level %logger{1} - %msg%n

# Stock sync: 20s là hợp lý để giảm tải cho MongoDB
spa.stock-sync.interval-ms=20000

